<!DOCTYPE html>
<html>
<head>
    <title>AI BG Remover</title>
</head>
<body>
    <h2>Upload Image</h2>
    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="image" required>
        <button type="submit">Remove Background</button>
    </form>

    {% if output_image %}
        <h3>Result:</h3>
        <img src="{{ output_image }}" width="300">
    {% endif %}
</body>
</html>
